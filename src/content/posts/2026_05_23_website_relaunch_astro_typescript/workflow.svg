<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="yellow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="gray-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#374151" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-yellow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Arrow Markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#4b5563" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#a855f7" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#3b82f6" />
    </marker>
  </defs>
  
  <!-- Background Card -->
  <rect width="800" height="250" rx="16" fill="#0b1329" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1.5" />
  
  <!-- Connectors -->
  <path d="M 230 125 L 310 125" stroke="url(#purple-grad)" stroke-width="3" marker-end="url(#arrow-purple)" />
  <path d="M 490 125 L 570 125" stroke="url(#blue-grad)" stroke-width="3" marker-end="url(#arrow-blue)" />
  
  <!-- LEGACY SOURCE PANEL -->
  <g transform="translate(40, 50)">
    <rect width="190" height="150" rx="12" fill="rgba(31, 41, 55, 0.5)" stroke="#4b5563" stroke-width="1" />
    <text x="95" y="28" fill="#9ca3af" font-family="'Outfit', 'Inter', sans-serif" font-size="12" font-weight="600" letter-spacing="1" text-anchor="middle">LEGACY SOURCE</text>
    
    <!-- PHP Box -->
    <rect x="20" y="45" width="150" height="40" rx="8" fill="url(#gray-grad)" stroke="#f59e0b" stroke-width="1.5" filter="url(#glow-yellow)" />
    <text x="95" y="70" fill="#f59e0b" font-family="'Outfit', 'Inter', sans-serif" font-size="14" font-weight="bold" text-anchor="middle">PHP Template Engine</text>
    
    <!-- XML/Content Database -->
    <rect x="20" y="95" width="150" height="40" rx="8" fill="url(#gray-grad)" stroke="#9ca3af" stroke-width="1" />
    <text x="95" y="120" fill="#e5e7eb" font-family="'Outfit', 'Inter', sans-serif" font-size="13" font-weight="500" text-anchor="middle">Static XML Content</text>
  </g>
  
  <!-- AI MIGRATION CORE -->
  <g transform="translate(320, 50)">
    <rect width="160" height="150" rx="12" fill="rgba(124, 58, 237, 0.08)" stroke="url(#purple-grad)" stroke-width="2" filter="url(#glow-purple)" />
    <text x="80" y="28" fill="#c084fc" font-family="'Outfit', 'Inter', sans-serif" font-size="11" font-weight="700" letter-spacing="1.5" text-anchor="middle">AI MIGRATION CORE</text>
    
    <!-- Antigravity Logo Placeholder -->
    <circle cx="80" cy="75" r="28" fill="url(#purple-grad)" />
    <text x="80" y="80" fill="#ffffff" font-family="'Outfit', 'Inter', sans-serif" font-size="16" font-weight="900" text-anchor="middle">AG</text>
    
    <!-- Gemini Flash -->
    <text x="80" y="122" fill="#ffffff" font-family="'Outfit', 'Inter', sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Gemini 3.5 Flash</text>
    <text x="80" y="136" fill="#a78bfa" font-family="'Outfit', 'Inter', sans-serif" font-size="10" font-weight="500" letter-spacing="0.5" text-anchor="middle">GOOGLE ANTIGRAVITY</text>
  </g>
  
  <!-- MODERN ASTRO DESTINATION -->
  <g transform="translate(580, 50)">
    <rect width="180" height="150" rx="12" fill="rgba(59, 130, 246, 0.08)" stroke="url(#blue-grad)" stroke-width="2" filter="url(#glow-blue)" />
    <text x="90" y="28" fill="#60a5fa" font-family="'Outfit', 'Inter', sans-serif" font-size="12" font-weight="600" letter-spacing="1" text-anchor="middle">ASTRO / TS TARGET</text>
    
    <!-- Astro Component -->
    <rect x="15" y="45" width="150" height="40" rx="8" fill="url(#gray-grad)" stroke="#3b82f6" stroke-width="1.5" />
    <text x="90" y="70" fill="#3b82f6" font-family="'Outfit', 'Inter', sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Astro Collections</text>
    
    <!-- TypeScript Frontmatter -->
    <rect x="15" y="95" width="150" height="40" rx="8" fill="url(#gray-grad)" stroke="#a855f7" stroke-width="1.5" />
    <text x="90" y="120" fill="#e5e7eb" font-family="'Outfit', 'Inter', sans-serif" font-size="13" font-weight="500" text-anchor="middle">TypeScript Schemas</text>
  </g>
</svg>
