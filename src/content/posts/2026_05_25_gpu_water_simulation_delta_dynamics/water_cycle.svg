<svg viewBox="0 0 920 450" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #0f172a; }
    .title { font-family: 'Inter', system-ui, sans-serif; font-size: 20px; font-weight: 700; fill: #f8fafc; }
    .label { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; font-weight: 500; fill: #94a3b8; }
    .code { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 11px; fill: #38bdf8; font-weight: bold; }
    .code-blue { fill: #38bdf8; }
    .code-green { fill: #4ade80; }
    .code-orange { fill: #fb923c; }
    .axis { stroke: #334155; stroke-width: 1.5; stroke-dasharray: 2 2; }
  </style>
  
  <rect width="100%" height="100%" class="bg" rx="12" />
  
  <!-- Title -->
  <text x="30" y="40" class="title">Delta Dynamics: Discrete Water Cycle Model</text>
  
  <!-- Main Grid Cell Structure -->
  <!-- Surface Water Layer (Blue Glassmorphism look) -->
  <rect x="270" y="100" width="400" height="80" fill="url(#water-grad)" rx="4" opacity="0.85" />
  
  <!-- Terrain/Top Soil Layer (Brown/Humus gradient) -->
  <rect x="270" y="180" width="400" height="20" fill="url(#terrain-top-grad)" />
  
  <!-- Subsurface/Aquifer Layer (Gravel/Rock gradient) -->
  <rect x="270" y="200" width="400" height="160" fill="url(#aquifer-grad)" rx="4" />
  
  <!-- Groundwater Level inside Aquifer (Saturated Blue/Green gradient) -->
  <rect x="270" y="260" width="400" height="100" fill="url(#groundwater-grad)" opacity="0.6" rx="4" />
  
  <!-- Grid Boundaries (dashed vertical lines representing cell limits) -->
  <line x1="270" y1="80" x2="270" y2="380" stroke="#475569" stroke-width="2" stroke-dasharray="6 4" />
  <line x1="670" y1="80" x2="670" y2="380" stroke="#475569" stroke-width="2" stroke-dasharray="6 4" />
  <text x="280" y="75" class="label" fill="#64748b">Cell Boundary (x)</text>
  <text x="660" y="75" class="label" fill="#64748b" text-anchor="end">Cell Boundary (x + dx)</text>
  
  <!-- Heights and Levels indicators -->
  <!-- Sea/Surface Level sL -->
  <line x1="220" y1="100" x2="720" y2="100" class="axis" />
  <text x="250" y="105" class="code code-blue" text-anchor="end">sL = th + sw</text>
  <text x="250" y="120" class="label" text-anchor="end">Surface Water Level</text>
  
  <!-- Terrain Height th -->
  <line x1="220" y1="180" x2="720" y2="180" class="axis" />
  <text x="250" y="185" class="code code-orange" text-anchor="end">th</text>
  <text x="250" y="200" class="label" text-anchor="end">Terrain Height</text>
  
  <!-- Groundwater Level gL -->
  <line x1="220" y1="260" x2="720" y2="260" class="axis" />
  <text x="250" y="265" class="code code-green" text-anchor="end">gL = th - 0.5 + (gw/ac)*0.5</text>
  <text x="250" y="280" class="label" text-anchor="end">Groundwater Level</text>
  
  <!-- Aquifer Capacity limit -->
  <line x1="220" y1="360" x2="720" y2="360" class="axis" stroke="#ef4444" />
  <text x="250" y="365" class="code" fill="#ef4444" text-anchor="end">ac</text>
  <text x="250" y="380" class="label" text-anchor="end">Aquifer Capacity</text>
  
  <!-- Dimensions arrows (vertical brackets) -->
  <!-- sw (Surface water depth) -->
  <path d="M 690 100 L 700 100 M 695 100 L 695 180 M 690 180 L 700 180" fill="none" stroke="#38bdf8" stroke-width="1.5" />
  <text x="705" y="145" class="code code-blue">sw</text>
  <text x="705" y="160" class="label">Surface Depth</text>
  
  <!-- gw (Groundwater volume) -->
  <path d="M 690 260 L 700 260 M 695 260 L 695 360 M 690 360 L 700 360" fill="none" stroke="#4ade80" stroke-width="1.5" />
  <text x="705" y="315" class="code code-green">gw</text>
  <text x="705" y="330" class="label">Groundwater Vol</text>
  
  <!-- Flow Fluxes (Arrows and Labels) -->
  <!-- 1. Rain (uRain) -->
  <path d="M 470 50 L 470 90" fill="none" stroke="#60a5fa" stroke-width="3" marker-end="url(#arrow-blue)" />
  <text x="470" y="45" class="code code-blue" text-anchor="middle">uRain</text>
  
  <!-- 2. Infiltration -->
  <path d="M 400 140 L 400 240" fill="none" stroke="#22c55e" stroke-width="3" stroke-dasharray="4 2" marker-end="url(#arrow-green)" />
  <text x="410" y="215" class="label" fill="#22c55e" font-weight="bold">Infiltration</text>
  <text x="410" y="230" class="code code-green" font-size="10px">min(sw, ac-gw, perm)</text>
  
  <!-- 3. Exfiltration / Saturation -->
  <path d="M 540 240 L 540 140" fill="none" stroke="#ea580c" stroke-width="3" stroke-dasharray="4 2" marker-end="url(#arrow-orange)" />
  <text x="550" y="215" class="label" fill="#ea580c" font-weight="bold">Saturation</text>
  <text x="550" y="230" class="code code-orange" font-size="10px">gw &gt; ac =&gt; sw += (gw - ac)</text>
  
  <!-- 4. Lateral Surface Flow -->
  <path d="M 240 140 L 300 140" fill="none" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow-sky)" />
  <path d="M 640 140 L 700 140" fill="none" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow-sky)" />
  <text x="270" y="130" class="label" fill="#0284c7" font-weight="bold" text-anchor="middle">Surface Flux</text>
  <text x="670" y="130" class="label" fill="#0284c7" font-weight="bold" text-anchor="middle">Surface Flux</text>
  
  <!-- 5. Lateral Groundwater Flow -->
  <path d="M 240 310 L 300 310" fill="none" stroke="#15803d" stroke-width="2.5" marker-end="url(#arrow-forest)" />
  <path d="M 640 310 L 700 310" fill="none" stroke="#15803d" stroke-width="2.5" marker-end="url(#arrow-forest)" />
  <text x="270" y="300" class="label" fill="#15803d" font-weight="bold" text-anchor="middle">Ground Flux</text>
  <text x="670" y="300" class="label" fill="#15803d" font-weight="bold" text-anchor="middle">Ground Flux</text>
  
  <!-- 6. Source / Sink (rl) -->
  <path d="M 300 110 L 340 130" fill="none" stroke="#06b6d4" stroke-width="2" marker-end="url(#arrow-cyan)" />
  <text x="350" y="130" class="code" fill="#06b6d4">rl &gt; 0 (Source)</text>
  
  <path d="M 600 130 L 640 110" fill="none" stroke="#f43f5e" stroke-width="2" marker-end="url(#arrow-rose)" />
  <text x="590" y="130" class="code" fill="#f43f5e" text-anchor="end">rl &lt; 0 (Sink)</text>
  
  <!-- Definitions of gradients and markers -->
  <defs>
    <linearGradient id="water-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#0284c7" stop-opacity="0.9" />
    </linearGradient>
    <linearGradient id="terrain-top-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#854d0e" />
      <stop offset="100%" stop-color="#713f12" />
    </linearGradient>
    <linearGradient id="aquifer-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4b5563" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
    <linearGradient id="groundwater-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#047857" stop-opacity="0.8" />
    </linearGradient>
    
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#60a5fa" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#22c55e" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#ea580c" />
    </marker>
    <marker id="arrow-sky" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#0284c7" />
    </marker>
    <marker id="arrow-forest" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#15803d" />
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#06b6d4" />
    </marker>
    <marker id="arrow-rose" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#f43f5e" />
    </marker>
  </defs>
</svg>
