<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="build-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.02" />
    </linearGradient>
    <linearGradient id="client-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.02" />
    </linearGradient>
    
    <linearGradient id="purple-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
    <linearGradient id="blue-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
    <linearGradient id="green-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <linearGradient id="yellow-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-p" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-b" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Arrow Markers -->
    <marker id="arr-gray" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#4b5563" />
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#a855f7" />
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#3b82f6" />
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#10b981" />
    </marker>
  </defs>
  
  <!-- Main Background -->
  <rect width="800" height="420" rx="16" fill="#0b1329" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1.5" />
  
  <!-- LEFT PANEL: COMPILE-TIME (ASTRO BUILD) -->
  <g transform="translate(25, 25)">
    <rect width="320" height="370" rx="12" fill="url(#build-grad)" stroke="rgba(168, 85, 247, 0.2)" stroke-width="1.5" />
    
    <!-- Title -->
    <text x="160" y="30" fill="#a855f7" font-family="'Outfit', 'Inter', sans-serif" font-size="14" font-weight="700" letter-spacing="1.5" text-anchor="middle">COMPILE-TIME (ASTRO BUILD)</text>
    <text x="160" y="45" fill="#6b7280" font-family="'Outfit', 'Inter', sans-serif" font-size="10" font-weight="500" text-anchor="middle">Runs statically during deployment</text>
    
    <!-- Content Collections -->
    <rect x="30" y="70" width="260" height="75" rx="8" fill="#111827" stroke="url(#purple-stroke)" stroke-width="1.2" />
    <text x="160" y="92" fill="#ffffff" font-family="'Outfit', 'Inter', sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Astro Content Collections</text>
    <text x="160" y="110" fill="#9ca3af" font-family="'Outfit', 'Inter', sans-serif" font-size="10" font-weight="500" text-anchor="middle">Posts, Projects, Courses, Publications,</text>
    <text x="160" y="125" fill="#9ca3af" font-family="'Outfit', 'Inter', sans-serif" font-size="10" font-weight="500" text-anchor="middle">&amp; Visualizations (.md / .mdx)</text>
    
    <!-- Endpoint -->
    <rect x="30" y="180" width="260" height="60" rx="8" fill="#111827" stroke="#4b5563" stroke-width="1" />
    <text x="160" y="200" fill="#e5e7eb" font-family="'Outfit', 'Inter', sans-serif" font-size="12" font-weight="600" text-anchor="middle">content-manifest.json.ts</text>
    <text x="160" y="218" fill="#9ca3af" font-family="'Outfit', 'Inter', sans-serif" font-size="10" font-weight="500" text-anchor="middle">Extracts item IDs, URLs, and pubDates</text>
    <text x="160" y="230" fill="#9ca3af" font-family="'Outfit', 'Inter', sans-serif" font-size="9" font-weight="500" text-anchor="middle">Uses compile-time Zod validation</text>
    
    <!-- Generated Manifest File -->
    <rect x="50" y="275" width="220" height="65" rx="8" fill="#111827" stroke="url(#yellow-stroke)" stroke-width="1.5" filter="url(#glow-p)" />
    <text x="160" y="295" fill="#f59e0b" font-family="'Outfit', 'Inter', sans-serif" font-size="13" font-weight="bold" text-anchor="middle">content-manifest.json</text>
    <text x="160" y="312" fill="#e5e7eb" font-family="'Outfit', 'Inter', sans-serif" font-size="10" font-weight="500" text-anchor="middle">Pre-compiled static dictionary</text>
    <text x="160" y="325" fill="#9ca3af" font-family="'Outfit', 'Inter', sans-serif" font-size="9" font-weight="500" text-anchor="middle">Served in milliseconds from CDN</text>

    <!-- Connectors -->
    <path d="M 160 145 L 160 180" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arr-purple)" />
    <path d="M 160 240 L 160 275" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arr-purple)" />
  </g>
  
  <!-- BRIDGE CONNECTOR -->
  <g>
    <path d="M 370 210 L 420 210" stroke="#f59e0b" stroke-dasharray="4,4" stroke-width="2" marker-end="url(#arr-gray)" />
    <text x="395" y="195" fill="#9ca3af" font-family="'Outfit', 'Inter', sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Fetches</text>
  </g>

  <!-- RIGHT PANEL: CLIENT-TIME (BROWSER ENVIRONMENT) -->
  <g transform="translate(450, 25)">
    <rect width="325" height="370" rx="12" fill="url(#client-grad)" stroke="rgba(59, 130, 246, 0.2)" stroke-width="1.5" />
    
    <!-- Title -->
    <text x="162.5" y="30" fill="#3b82f6" font-family="'Outfit', 'Inter', sans-serif" font-size="14" font-weight="700" letter-spacing="1.5" text-anchor="middle">CLIENT-TIME (BROWSER)</text>
    <text x="162.5" y="45" fill="#6b7280" font-family="'Outfit', 'Inter', sans-serif" font-size="10" font-weight="500" text-anchor="middle">Handles instant rendering and active syncing</text>
    
    <!-- LocalStorage State -->
    <rect x="25" y="70" width="275" height="55" rx="8" fill="#111827" stroke="url(#green-stroke)" stroke-width="1.2" />
    <text x="162.5" y="90" fill="#10b981" font-family="'Outfit', 'Inter', sans-serif" font-size="12" font-weight="bold" text-anchor="middle">LocalStorage (Client Cache)</text>
    <text x="162.5" y="105" fill="#9ca3af" font-family="'Outfit', 'Inter', sans-serif" font-size="10" font-weight="500" text-anchor="middle">Stores visit history &amp; manifest cache</text>
    
    <!-- Synchronous Inline Script -->
    <rect x="25" y="150" width="275" height="75" rx="8" fill="#111827" stroke="url(#blue-stroke)" stroke-width="1.5" filter="url(#glow-b)" />
    <text x="162.5" y="172" fill="#ffffff" font-family="'Outfit', 'Inter', sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Synchronous Inline Script (is:inline)</text>
    <text x="162.5" y="188" fill="#3b82f6" font-family="'Outfit', 'Inter', sans-serif" font-size="10" font-weight="bold" text-anchor="middle">FLICKER-FREE PAINTING</text>
    <text x="162.5" y="202" fill="#9ca3af" font-family="'Outfit', 'Inter', sans-serif" font-size="9" font-weight="500" text-anchor="middle">Instantly matches DOM to cached storage before layout</text>
    
    <!-- Asynchronous Sync Module -->
    <rect x="25" y="260" width="275" height="75" rx="8" fill="#111827" stroke="#4b5563" stroke-width="1" />
    <text x="162.5" y="280" fill="#e5e7eb" font-family="'Outfit', 'Inter', sans-serif" font-size="12" font-weight="600" text-anchor="middle">Asynchronous Module (ES module)</text>
    <text x="162.5" y="296" fill="#a855f7" font-family="'Outfit', 'Inter', sans-serif" font-size="10" font-weight="bold" text-anchor="middle">BACKGROUND SYNCHRONIZATION</text>
    <text x="162.5" y="310" fill="#9ca3af" font-family="'Outfit', 'Inter', sans-serif" font-size="9" font-weight="500" text-anchor="middle">Fetches manifest, tracks routing, &amp; updates cache</text>

    <!-- Client Connections -->
    <!-- LocalStorage to Sync Script -->
    <path d="M 80 125 L 80 150" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-green)" />
    <path d="M 245 150 L 245 125" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="2,2" marker-end="url(#arr-blue)" />
    
    <!-- LocalStorage to Async Script -->
    <path d="M 120 125 L 120 260" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-green)" />
    <path d="M 205 260 L 205 125" stroke="#a855f7" stroke-width="1.2" stroke-dasharray="2,2" marker-end="url(#arr-purple)" />
    
    <!-- Async Script updates sync scripts results (or triggers DOM update) -->
    <path d="M 162.5 260 L 162.5 225" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arr-purple)" />
  </g>
</svg>
