<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG Image Template</title>
  <!-- Load fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 1200px;
      height: 630px;
      background: radial-gradient(circle at 50% 0%, #12244a 0%, #030712 100%);
      font-family: "Inter", sans-serif;
      color: #f3f4f6;
      overflow: hidden;
      position: relative;
    }

    /* Glow orbs matching the website layout */
    .bg-glow-orb {
      position: absolute;
      border-radius: 60% 40% 55% 45%;
      filter: blur(12vw);
      opacity: 0.28;
      pointer-events: none;
    }
    .orb-blue {
      background-color: #3b82f6;
      width: 600px;
      height: 500px;
      top: -150px;
      left: -150px;
    }
    .orb-purple {
      background-color: #a855f7;
      width: 550px;
      height: 450px;
      top: 200px;
      right: -100px;
    }

    .orb-green {
      background-color: #10b981;
      width: 500px;
      height: 400px;
      top: 50px;
      left: 600px;
    }

    /* Main layout */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      padding: 60px 80px;
      align-items: center;
      justify-content: space-between;
    }

    /* Content details */
    .content-left {
      position: relative;
      z-index: 30;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
    }

    .brand-logo {
      width: 64px;
      height: 64px;
      margin-bottom: 25px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 16px;
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3), inset 0 1px 1px 0 rgba(255, 255, 255, 0.2);
      padding: 8px;
      box-sizing: border-box;
    }

    .name {
      font-family: "Outfit", sans-serif;
      font-weight: 700;
      font-size: 76px;
      line-height: 1.1;
      color: #ffffff;
      margin: 0 0 20px -6px;
      letter-spacing: -1.5px;
    }

    .roles-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin: 0 0 45px 0;
    }

    .role-item {
      font-family: "Outfit", sans-serif;
      font-weight: 600;
      font-size: 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      line-height: 1.2;
    }

    .role-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block;
    }

    .role-professor {
      color: #10b981; /* Green */
    }
    .role-professor .role-dot {
      background-color: #10b981;
      box-shadow: 0 0 12px rgba(16, 185, 129, 0.6);
    }

    .role-engineer {
      color: #f59e0b; /* Orange */
    }
    .role-engineer .role-dot {
      background-color: #f59e0b;
      box-shadow: 0 0 12px rgba(245, 158, 11, 0.6);
    }

    .role-entrepreneur {
      color: #a855f7; /* Purple */
    }
    .role-entrepreneur .role-dot {
      background-color: #a855f7;
      box-shadow: 0 0 12px rgba(168, 85, 247, 0.6);
    }

    .website-url {
      font-family: "Outfit", sans-serif;
      font-size: 22px;
      font-weight: 600;
      color: #f3f4f6;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 12px 26px;
      border-radius: 9999px;
      background: rgba(59, 130, 246, 0.08);
      border: 1px solid rgba(59, 130, 246, 0.3);
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.15);
      width: fit-content;
    }

    .github-icon {
      width: 24px;
      height: 24px;
      color: #3b82f6; /* Brand Blue */
    }

    /* Profile Card (Right Side) */
    .profile-card-container {
      position: absolute;
      top: 0;
      right: 0;
      width: 630px;
      height: 630px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      z-index: 10;
    }



    .profile-svg {
      width: 100%;
      height: 100%;
      user-select: none;
      pointer-events: none;
      position: relative;
      z-index: 10;
    }

    .profile-svg-image {
    }
  </style>
</head>
<body>
  <div class="bg-glow-orb orb-blue"></div>
  <div class="bg-glow-orb orb-purple"></div>
  <div class="bg-glow-orb orb-green"></div>

  <!-- Container -->
  <div class="container">
    <!-- Left Section -->
    <div class="content-left">
      <h1 class="name">Dr. Georg Hackenberg</h1>
      
      <div class="roles-list">
        <div class="role-item role-professor">
          <span class="role-dot"></span>
          <span>Professor for Industrial Informatics</span>
        </div>
        <div class="role-item role-engineer">
          <span class="role-dot"></span>
          <span>Software Engineer</span>
        </div>
        <div class="role-item role-entrepreneur">
          <span class="role-dot"></span>
          <span>Entrepreneur</span>
        </div>
      </div>
      
      <div class="website-url">
        <svg class="github-icon" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd" />
        </svg>
        <span>ghackenberg.github.io</span>
      </div>
    </div>

    <!-- Right Section -->
    <div class="profile-card-container">
      <svg viewBox="0 0 100 100" class="profile-svg">
        <defs>
          <!-- SVG RadialGradient for soft bottom fadeout, keeping top head sharp -->
          <radialGradient id="fadeGradient" cx="50%" cy="30%" r="70%">
            <stop offset="55%" stop-color="#fff" stop-opacity="1" />
            <stop offset="95%" stop-color="#fff" stop-opacity="0" />
          </radialGradient>
          <!-- SVG Mask applying the gradient -->
          <mask id="fadeMask">
            <rect x="0" y="0" width="100%" height="100%" fill="url(#fadeGradient)" />
          </mask>
        </defs>
        <!-- Group using mask for vignette blend without clipping boundaries -->
        <g>
          <!-- Image inside using mask for vignette blend -->
          <image
            href="images/comic-profile.png"
            x="0"
            y="0"
            width="100"
            height="100"
            preserveAspectRatio="xMidYMid slice"
            mask="url(#fadeMask)"
            class="profile-svg-image"
          />
        </g>
      </svg>
    </div>
  </div>
</body>
</html>
