<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG Image Template</title>
  <!-- Load fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 1200px;
      height: 630px;
      background-color: #030712;
      font-family: "Inter", sans-serif;
      color: #f3f4f6;
      overflow: hidden;
      position: relative;
    }

    /* Glow orbs matching the website layout */
    .bg-glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      pointer-events: none;
    }
    .orb-blue {
      background-color: #3b82f6;
      width: 500px;
      height: 500px;
      top: -150px;
      left: -150px;
    }
    .orb-purple {
      background-color: #a855f7;
      width: 450px;
      height: 450px;
      top: 200px;
      right: -100px;
    }
    .orb-yellow {
      background-color: #f59e0b;
      width: 350px;
      height: 350px;
      bottom: -50px;
      left: 150px;
    }
    .orb-green {
      background-color: #10b981;
      width: 400px;
      height: 400px;
      top: 50px;
      left: 600px;
    }

    /* Main layout */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      padding: 60px 80px;
      align-items: center;
      justify-content: space-between;
    }

    /* Content details */
    .content-left {
      position: relative;
      z-index: 30;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
    }

    .brand-logo {
      display: flex;
      align-items: center;
      margin-bottom: 30px;
    }
    
    .logo-text {
      font-family: "Outfit", sans-serif;
      font-weight: 800;
      font-size: 32px;
      background: linear-gradient(135deg, #3b82f6 0%, #a855f7 50%, #f59e0b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    .name {
      font-family: "Outfit", sans-serif;
      font-weight: 800;
      font-size: 54px;
      line-height: 1.1;
      color: #ffffff;
      margin: 0 0 15px 0;
      letter-spacing: -1px;
      white-space: nowrap;
    }

    .title {
      font-family: "Outfit", sans-serif;
      font-weight: 700;
      font-size: 24px;
      color: #3b82f6; /* Brand Blue */
      margin: 0 0 10px 0;
      letter-spacing: -0.5px;
      white-space: nowrap;
    }

    .subtitle {
      font-size: 18px;
      color: #9ca3af;
      margin: 0 0 35px 0;
      line-height: 1.5;
      font-weight: 500;
      white-space: nowrap;
    }

    .badges {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
      flex-wrap: nowrap;
    }

    .badge {
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
    }
    
    .badge-blue {
      color: #3b82f6;
      border-color: rgba(59, 130, 246, 0.2);
      background: rgba(59, 130, 246, 0.05);
    }

    .badge-purple {
      color: #a855f7;
      border-color: rgba(168, 85, 247, 0.2);
      background: rgba(168, 85, 247, 0.05);
    }

    .badge-yellow {
      color: #f59e0b;
      border-color: rgba(245, 158, 11, 0.2);
      background: rgba(245, 158, 11, 0.05);
    }

    .badge-green {
      color: #10b981;
      border-color: rgba(16, 185, 129, 0.2);
      background: rgba(16, 185, 129, 0.05);
    }

    .website-url {
      font-family: "Outfit", sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: #f3f4f6;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 22px;
      border-radius: 9999px;
      background: rgba(59, 130, 246, 0.08);
      border: 1px solid rgba(59, 130, 246, 0.3);
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.15);
      width: fit-content;
      margin-top: 15px;
    }

    .github-icon {
      width: 20px;
      height: 20px;
      color: #3b82f6; /* Brand Blue */
    }

    /* Profile Card (Right Side) */
    .profile-card-container {
      position: absolute;
      top: 55px;
      right: 0;
      width: 520px;
      height: 520px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      z-index: 10;
    }

    .profile-svg {
      width: 100%;
      height: 100%;
      user-select: none;
      pointer-events: none;
    }

    .profile-svg-image {
      mix-blend-mode: screen;
    }
  </style>
</head>
<body>
  <!-- Decorative Glow Orbs -->
  <div class="bg-glow-orb orb-blue"></div>
  <div class="bg-glow-orb orb-purple"></div>
  <div class="bg-glow-orb orb-yellow"></div>
  <div class="bg-glow-orb orb-green"></div>

  <!-- Container -->
  <div class="container">
    <!-- Left Section -->
    <div class="content-left">
      <div class="brand-logo">
        <h2 class="logo-text">GH.</h2>
      </div>
      
      <h1 class="name">Dr. Georg Hackenberg</h1>
      <p class="title">Professor for Industrial Informatics</p>
      <p class="subtitle">Software Engineer, Entrepreneur, and Creator of CADdrive &amp; Mentawise</p>
      
      <div class="badges">
        <span class="badge badge-blue">Deep Work</span>
        <span class="badge badge-yellow">Industrial IT</span>
        <span class="badge badge-purple">Strategy</span>
        <span class="badge badge-green">Regeneration</span>
      </div>

      <div class="website-url">
        <svg class="github-icon" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd" />
        </svg>
        <span>ghackenberg.github.io</span>
      </div>
    </div>

    <!-- Right Section -->
    <div class="profile-card-container">
      <svg viewBox="0 0 100 100" class="profile-svg">
        <defs>
          <!-- SVG ClipPath for perfect circular crop -->
          <clipPath id="circleClip">
            <circle cx="50" cy="50" r="50" />
          </clipPath>
          <!-- SVG RadialGradient for soft fadeout matching design -->
          <radialGradient id="fadeGradient" cx="50%" cy="45%" r="75%">
            <stop offset="35%" stop-color="#fff" stop-opacity="1" />
            <stop offset="70%" stop-color="#fff" stop-opacity="0" />
          </radialGradient>
          <!-- SVG Mask applying the gradient -->
          <mask id="fadeMask">
            <rect x="0" y="0" width="100%" height="100%" fill="url(#fadeGradient)" />
          </mask>
        </defs>
        <!-- Group using the clip path for circular boundary -->
        <g clip-path="url(#circleClip)">
          <!-- Image inside clip and using mask for vignette blend -->
          <image
            href="images/comic_profile.png"
            x="0"
            y="0"
            width="100"
            height="100"
            preserveAspectRatio="xMidYMid slice"
            mask="url(#fadeMask)"
            class="profile-svg-image"
          />
        </g>
      </svg>
    </div>
  </div>
</body>
</html>
