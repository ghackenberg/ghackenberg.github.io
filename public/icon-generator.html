<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Icon Generator</title>
  <style>
    /* Reset and set transparent body */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent !important;
      overflow: hidden;
    }
    
    /* Standard transparent container */
    #transparent-icon {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
    }

    #transparent-icon svg {
      width: 100%;
      height: 100%;
    }

    /* Maskable icon container (with background and 15-20% padding/safe zone margin) */
    #maskable-icon {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #030712; /* site theme color background */
    }

    #maskable-icon svg {
      width: 70%; /* 15% padding on all sides */
      height: 70%;
    }
  </style>
</head>
<body>
  <!-- Standard container -->
  <div id="transparent-icon">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
      <defs>
        <linearGradient id="gh-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#3b82f6" />
          <stop offset="50%" stop-color="#a855f7" />
          <stop offset="100%" stop-color="#f59e0b" />
        </linearGradient>
        <style>
          .text-logo {
            font-family: 'Outfit', 'Inter', system-ui, sans-serif;
            font-weight: 800;
            font-size: 68px;
            fill: url(#gh-gradient);
          }
        </style>
      </defs>
      <text x="50%" y="68" dominant-baseline="middle" text-anchor="middle" class="text-logo">GH.</text>
    </svg>
  </div>

  <script>
    // Simple toggle between transparent and maskable modes
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode') || 'transparent';
    
    const transparentEl = document.getElementById('transparent-icon');
    
    if (mode === 'maskable') {
      transparentEl.id = 'maskable-icon';
    }
  </script>
</body>
</html>
